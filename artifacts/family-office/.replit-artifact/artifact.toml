kind = "web"
previewPath = "/"
title = "Family Office"
version = "1.0.0"
id = "artifacts/family-office"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19019

[services.development]
run = "pnpm --filter @workspace/family-office run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-office", "run", "build" ]
publicDir = "artifacts/family-office/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19019"
BASE_PATH = "/"
