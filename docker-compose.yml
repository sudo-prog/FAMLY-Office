version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: famly-office-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-famly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-famly_secret}
      POSTGRES_DB: ${POSTGRES_DB:-famly_office}
    ports:
      - "5433:5432"
    volumes:
      - famly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-famly} -d ${POSTGRES_DB:-famly_office}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  famly_postgres_data:
    driver: local
